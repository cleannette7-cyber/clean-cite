[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"

[functions]
  included_files = ["data/planning.json"]
