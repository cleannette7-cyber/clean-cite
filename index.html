<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculateur de Pre-Devis - Clean-Cité</title>
  <style>
    :root {
      --primary: #0a2540;
      --orange: #ff6b35;
      --gray: #64748b;
      --light-bg: #f8fafc;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--light-bg);
      color: var(--primary);
      margin: 0;
      padding: 20px;
    }

    .devis-container {
      max-width: 700px;
      margin: 40px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    h3, h4 {
      margin-top: 0;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 15px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: normal;
      cursor: pointer;
      background: var(--light-bg);
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: background 0.2s;
    }

    .checkbox-label:hover {
      background: #edf2f7;
    }

    .conditional-fields {
      background: #f1f5f9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid var(--orange);
    }

    .sub-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    input[type="number"], select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-sizing: border-box;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn-submit {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }

    .btn-submit:hover {
      background-color: #113854;
    }

    .btn-secondary {
      background-color: var(--orange);
      margin-top: 15px;
    }

    .btn-secondary:hover {
      background-color: #e0531f;
    }

    /* Étape 2 & Rendu du devis */
    .devis-result-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      background: #fff;
    }

    .devis-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px dashed var(--border);
    }

    .devis-line:last-child {
      border-bottom: none;
    }

    .devis-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 2px solid var(--primary);
    }

    .devis-total strong {
      color: var(--orange);
    }

    .devis-remark {
      margin-top: 15px;
      font-size: 14px;
      font-style: italic;
      color: var(--gray);
      background: #fafafa;
      padding: 10px;
      border-radius: 4px;
    }

    .loading-spinner {
      text-align: center;
      padding: 30px 0;
      font-weight: 600;
      color: var(--gray);
    }
  </style>
</head>
<body>

<div class="devis-container">
  <!-- ÉTAPE 1 : Saisie du besoin -->
  <div id="devis-step1">
    <h3>Simulateur de Devis Éclair</h3>
    <p style="color: var(--gray); font-size: 14px; margin-bottom: 20px;">Sélectionnez vos services pour obtenir une estimation instantanée.</p>
    
    <div class="form-group">
      <label>Services souhaités :</label>
      <div class="checkbox-group">
        <label class="checkbox-label"><input type="checkbox" name="srv" value="Tapis" onchange="toggleFields()"> Nettoyage Tapis</label>
        <label class="checkbox-label"><input type="checkbox" name="srv" value="Canapé" onchange="toggleFields()"> Nettoyage Canapé</label>
        <label class="checkbox-label"><input type="checkbox" name="srv" value="Terrasse" onchange="toggleFields()"> Nettoyage Terrasse</label>
        <label class="checkbox-label"><input type="checkbox" name="srv" value="Gestion des clés"> Gestion des clés</label>
        <label class="checkbox-label"><input type="checkbox" name="srv" value="Intervention urgente"> Intervention urgente</label>
        <label class="checkbox-label"><input type="checkbox" name="srv" value="Autre prestation"> Autre besoin</label>
      </div>
    </div>

    <!-- Champs conditionnels Tapis -->
    <div id="field-tapis" class="conditional-fields" style="display:none;">
      <label>Détails Tapis</label>
      <div class="sub-grid">
        <div>
          <span style="font-size:13px;">Petits tapis (< 4m²) :</span>
          <input type="number" id="d-tapis-petit" value="0" min="0">
        </div>
        <div>
          <span style="font-size:13px;">Grands tapis (> 4m²) :</span>
          <input type="number" id="d-tapis-grand" value="0" min="0">
        </div>
      </div>
    </div>

    <!-- Champs conditionnels Canapé -->
    <div id="field-canape" class="conditional-fields" style="display:none;">
      <label>Détails Canapé</label>
      <div class="sub-grid">
        <div>
          <span style="font-size:13px;">Nombre de places :</span>
          <input type="number" id="d-canape-places" value="0" min="0">
        </div>
        <div style="display: flex; align-items: center; margin-top: 18px;">
          <label class="checkbox-label" style="width: 100%;"><input type="checkbox" id="d-canape-angle"> Canapé d'angle ?</label>
        </div>
      </div>
    </div>

    <!-- Champs conditionnels Terrasse -->
    <div id="field-terrasse" class="conditional-fields" style="display:none;">
      <label>Détails Terrasse</label>
      <div class="sub-grid">
        <div>
          <span style="font-size:13px;">Superficie estimée (m²) :</span>
          <input type="number" id="d-surface" value="0" min="0">
        </div>
        <div>
          <span style="font-size:13px;">État général :</span>
          <select id="d-etat">
            <option value="normal">Moyennement sale</option>
            <option value="très sale">Très encrassé / Mousses</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Options supplémentaires -->
    <div class="form-group">
      <label>Options & Suppléments :</label>
      <div class="checkbox-group">
        <label class="checkbox-label"><input type="checkbox" name="supp" value="désinfection"> Désinfection (+20%)</label>
        <label class="checkbox-label"><input type="checkbox" name="supp" value="taches difficiles"> Taches difficiles (+30€)</label>
        <label class="checkbox-label"><input type="checkbox" name="supp" value="poils d'animaux"> Poils d'animaux (+25€)</label>
        <label class="checkbox-label"><input type="checkbox" name="supp" value="déplacement"> Hors zone proche (+20€)</label>
      </div>
    </div>

    <!-- Précisions textuelles -->
    <div class="form-group">
      <label for="d-desc">Précisions ou demandes particulières :</label>
      <textarea id="d-desc" placeholder="Ex: Type de textile, contraintes d'accès, horaires particuliers..."></textarea>
    </div>

    <button type="button" class="btn-submit" onclick="genererDevis()">Calculer mon estimation</button>
  </div>

  <!-- ÉTAPE 2 : Traitement et Affichage du résultat -->
  <div id="devis-step2" style="display:none;">
    <div id="devis-loading" class="loading-spinner">
      Analyse de vos critères et calcul en cours...
    </div>
    
    <div id="devis-result"></div>
    
    <button type="button" class="btn-submit btn-secondary" onclick="envoyerDevis()">Valider et finaliser la demande</button>
    <button type="button" class="btn-submit" style="background:#e2e8f0; color:var(--primary); margin-top:10px;" onclick="reinitialiser()">Modifier les informations</button>
  </div>
</div>

<script>
// Raccourci DOM
const $ = id => document.getElementById(id);

// Gestion de l'affichage dynamique des champs du formulaire
function toggleFields() {
  const services = Array.from(document.querySelectorAll('input[name="srv"]:checked')).map(el => el.value);
  $('field-tapis').style.display = services.includes('Tapis') ? 'block' : 'none';
  $('field-canape').style.display = services.includes('Canapé') ? 'block' : 'none';
  $('field-terrasse').style.display = services.includes('Terrasse') ? 'block' : 'none';
}

// Réinitialisation globale du module
function reinitialiser() {
  $('devis-step2').style.display = 'none';
  $('devis-step1').style.display = 'block';
  $('devis-loading').style.display = 'block';
}

function closeAll() {
  // Fonction utilitaire pour fermer d'éventuelles fenêtres modales environnantes si nécessaire
  console.log("Fermeture des fenêtres de devis.");
}

// Fonction maîtresse de calcul et génération
function genererDevis() {
  // Extraction des valeurs de l'étape 1
  const services = Array.from(document.querySelectorAll('input[name="srv"]:checked')).map(el => el.value);
  const supps = Array.from(document.querySelectorAll('input[name="supp"]:checked')).map(el => el.value);
  
  const tapisPetit = parseInt($('d-tapis-petit').value) || 0;
  const tapisGrand = parseInt($('d-tapis-grand').value) || 0;
  const canapePlaces = parseInt($('d-canape-places').value) || 0;
  const canapeAngle = $('d-canape-angle').checked;
  const surface = parseFloat($('d-surface').value) || 0;
  const etat = $('d-etat').value;
  const desc = $('d-desc').value.trim();

  // Validation de base : au moins un service doit être coché
  if(services.length === 0) {
    alert('Veuillez sélectionner au moins un service pour générer une estimation.');
    return;
  }

  let total = 0;
  let lignes = [];

  // Fonction interne de construction de ligne de devis
  function addLine(service, detail, montant) {
    lignes.push({ service, detail, montant });
    if (typeof montant === 'number') {
      total += montant;
    }
  }

  // --- TRAITEMENT DES SERVICES INDIVIDUELS ---

  if(services.includes('Tapis')){
    if(!tapisPetit && !tapisGrand){
      alert('Pour le service Tapis, veuillez indiquer la quantité de petits ou grands tapis.');
      return;
    }
    const mtTapis = (tapisPetit * 45) + (tapisGrand * 115);
    addLine('Tapis', `${tapisPetit} petit(s), ${tapisGrand} grand(s)`, mtTapis);
  }

  if(services.includes('Canapé')){
    if(!canapePlaces){
      alert('Pour le service Canapé, veuillez spécifier le nombre de places.');
      return;
    }
    let mtCanape = canapePlaces * 50;
    if(canapeAngle) mtCanape += 60;
    addLine('Canapé', `${canapePlaces} place(s) ${canapeAngle ? 'd’angle' : ''}`, mtCanape);
  }

  if(services.includes('Terrasse')){
    if(!surface){
      alert('Pour le nettoyage de terrasse, veuillez renseigner la superficie en m².');
      return;
    }
    let tarifTerrasse = 4;
    if(etat === 'très sale') tarifTerrasse = 6;
    addLine('Terrasse', `${surface} m² (État : ${etat})`, Math.max(surface * tarifTerrasse, 99));
  }

  if(services.includes('Gestion des clés')){
    addLine('Gestion des clés', 'Coordination et accès chantier sur site', 'Sur devis');
  }

  if(services.includes('Intervention urgente')){
    addLine('Intervention urgente', 'Forfait de prise en charge prioritaire', 50);
  }

  if(services.includes('Autre prestation')){
    addLine('Autre prestation', 'Selon description des besoins', 'Sur devis');
  }

  // --- APPLICATION DES SUPPLÉMENTS ---
  supps.forEach(s => {
    if(s === 'désinfection') addLine('Supplément', 'Désinfection complète des surfaces (+20%)', total * 0.20);
    if(s === 'taches difficiles') addLine('Supplément', 'Traitement taches incrustées / spécifiques', 30);
    if(s === 'poils d\'animaux') addLine('Supplément', 'Aspiration en profondeur (poils)', 25);
    if(s === 'déplacement') addLine('Supplément', 'Frais de déplacement Île-de-France', 20);
  });

  // --- INTERFACE ÉTAPE 2 ---
  $('devis-step1').style.display = 'none';
  $('devis-step2').style.display = 'block';

  // Animation visuelle de chargement (1 seconde)
  setTimeout(() => {
    $('devis-loading').style.display = 'none';
    
    let htmlResult = `<h4>Votre estimation Clean-Cité</h4><div class="devis-result-card">`;
    
    lignes.forEach(l => {
      let mtText = typeof l.montant === 'number' ? `${Math.round(l.montant)} €` : l.montant;
      htmlResult += `
        <div class="devis-line">
          <div><strong>${l.service}</strong><br><small style="color:var(--gray);">${l.detail}</small></div>
          <strong style="color:var(--orange);">${mtText}</strong>
        </div>`;
    });
    
    htmlResult += `</div>`;

    // Gestion de l'affichage final du montant total
    if(typeof total === 'number' && total > 0){
      htmlResult += `<div class="devis-total"><span>Estimation Totale Indicative :</span><strong>${Math.round(total)} €</strong></div>`;
    } else {
      htmlResult += `<div class="devis-total"><span>Estimation Totale :</span><strong>Sur devis (Gratuit sous 24h)</strong></div>`;
    }

    if(desc){
      htmlResult += `<div class="devis-remark"><strong>Vos précisions :</strong><br>"${desc}"</div>`;
    }

    $('devis-result').innerHTML = htmlResult;
  }, 1000);
}

// Validation finale de l'étape 2
function envoyerDevis(){
  alert('Votre pré-devis a été pris en compte ! Pour finaliser votre demande et recevoir votre devis officiel signé, veuillez valider le formulaire de contact principal en bas de page.');
  closeAll();
  window.location.hash = '#contact';
}
</script>
</body>
</html>
