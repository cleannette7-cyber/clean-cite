<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Administration Clean-Cité</title>
  <link rel="icon" type="image/png" href="/images/favicon-clean-cite.png?v=4">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body{font-family:Arial,sans-serif;background:#f8f9fc;color:#1a2f5e;margin:0}
    .admin-loading{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px}
    .admin-loading div{background:#fff;border-radius:24px;box-shadow:0 16px 50px rgba(26,47,94,.12);padding:34px;max-width:560px}
    .admin-loading img{height:74px;object-fit:contain;margin-bottom:14px}
    .admin-loading h1{margin:0 0 10px;font-size:28px}.admin-loading p{color:#6b7280;line-height:1.6;margin:0}
  </style>
</head>
<body>
  <div class="admin-loading">
    <div>
      <img src="/images/logo-clean-cite.png" alt="Logo Clean-Cité">
      <h1>Espace admin Clean-Cité</h1>
      <p>Connectez-vous pour ajouter vos photos avant / après, modifier le planning et publier les changements sur le site.</p>
    </div>
  </div>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
