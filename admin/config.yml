backend:
  name: git-gateway
  branch: main
  # Sécurité Clean-Cité : l’accès /admin/ est aussi filtré par email dans admin/index.html.
  # Seul cleannette7@gmail.com doit conserver le rôle admin dans Netlify Identity.
  accept_roles:
    - admin

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: "https://clean-cite.org"
display_url: "https://clean-cite.org"
logo_url: "/images/logo-clean-cite.png"
locale: "fr"

collections:
  - name: "gestion_site"
    label: "Gestion du site"
    files:
      - name: "interventions_avant_apres"
        label: "Avant / Après de mes interventions"
        file: "data/interventions.json"
        format: "json"
        fields:
          - label: "Interventions"
            name: "interventions"
            widget: "list"
            summary: "{{fields.titre}} — {{fields.type_prestation}} — {{fields.ville}}"
            minimize_collapsed: true
            fields:
              - label: "Publier sur le site"
                name: "publier"
                widget: "boolean"
                default: true
              - label: "Titre"
                name: "titre"
                widget: "string"
                required: true
                hint: "Exemple : Nettoyage fin de chantier à Bobigny"
              - label: "Type de prestation"
                name: "type_prestation"
                widget: "select"
                required: true
                options:
                  - "Chantier en cours"
                  - "Fin de chantier"
                  - "Remise en état"
                  - "Bureaux & locaux"
                  - "Parties communes"
                  - "Sortie de poubelles"
                  - "Vitrerie"
                  - "Tapis & canapés"
                  - "Terrasses & extérieurs"
                  - "Gestion des clés"
                  - "Autre"
              - label: "Ville / secteur"
                name: "ville"
                widget: "string"
                required: false
                default: "Île-de-France"
                hint: "Exemple : Bobigny, Paris, Saint-Denis"
              - label: "Date"
                name: "date"
                widget: "datetime"
                required: false
                date_format: "DD/MM/YYYY"
                time_format: false
                format: "YYYY-MM-DD"
              - label: "Description courte"
                name: "description"
                widget: "text"
                required: false
                hint: "Expliquez rapidement ce qui a été nettoyé."
              - label: "Photo avant"
                name: "photo_avant"
                widget: "image"
                required: true
              - label: "Photo après"
                name: "photo_apres"
                widget: "image"
                required: true

      - name: "planning_interventions"
        label: "Planning des interventions"
        file: "data/planning.json"
        format: "json"
        fields:
          - label: "Planning"
            name: "planning"
            widget: "list"
            summary: "{{fields.date}} - {{fields.heure}} - {{fields.type_prestation}}"
            minimize_collapsed: true
            fields:
              - label: "Publier sur le site"
                name: "publier"
                widget: "boolean"
                default: true
              - label: "Email du client"
                name: "client_email"
                widget: "string"
                required: true
                hint: "IMPORTANT : mettre l’email exact du compte client. Seul ce client verra cette intervention dans son planning."
              - label: "Nom du client / société"
                name: "client_nom"
                widget: "string"
                required: false
                hint: "Exemple : Résidence Les Jardins, Mme Diallo, Société ABC"
              - label: "Date"
                name: "date"
                widget: "datetime"
                required: true
                date_format: "DD/MM/YYYY"
                time_format: false
                format: "YYYY-MM-DD"
              - label: "Heure"
                name: "heure"
                widget: "string"
                required: false
                hint: "Exemple : 09h00 - 11h00"
              - label: "Type de prestation"
                name: "type_prestation"
                widget: "select"
                options:
                  - "Nettoyage de chantier"
                  - "Parties communes"
                  - "Bureaux & locaux"
                  - "Vitrerie"
                  - "Remise en état"
                  - "Rendez-vous devis"
                  - "Autre"
              - label: "Ville / secteur"
                name: "ville"
                widget: "string"
                required: false
                hint: "Exemple : Bobigny, Paris, Saint-Denis"
              - label: "Statut"
                name: "statut"
                widget: "select"
                options:
                  - "Prévu"
                  - "Confirmé"
                  - "Terminé"
                  - "Annulé"
              - label: "Note publique"
                name: "note"
                widget: "text"
                required: false
                hint: "Ne pas mettre d'information privée client."
